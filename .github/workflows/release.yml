name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Build server binary
        run: |
          cd extension/server
          bun build --compile src/host.js --outfile zen-bridge-server-macos-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: zen-bridge-server-macos-arm64
          path: extension/server/zen-bridge-server-macos-arm64

  build-macos-x64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Build server binary
        run: |
          cd extension/server
          bun build --compile src/host.js --outfile zen-bridge-server-macos-x64
      - uses: actions/upload-artifact@v4
        with:
          name: zen-bridge-server-macos-x64
          path: extension/server/zen-bridge-server-macos-x64

  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Build server binary
        run: |
          cd extension/server
          bun build --compile src/host.js --outfile zen-bridge-server-linux-x64
      - uses: actions/upload-artifact@v4
        with:
          name: zen-bridge-server-linux-x64
          path: extension/server/zen-bridge-server-linux-x64

  release:
    runs-on: ubuntu-latest
    needs: [build-macos-arm64, build-macos-x64, build-linux-x64]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install extension deps
        run: |
          cd extension
          npm install

      - name: Sign extension with AMO
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
        run: |
          cd extension
          npx web-ext sign

      - name: Download server binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Copy install script
        run: |
          mkdir -p dist
          cp install.sh dist/install.sh

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            extension/dist/*.xpi
            dist/*
          generate_release_notes: true
