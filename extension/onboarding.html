<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Zen Bridge Setup</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 60px auto; padding: 20px; line-height: 1.6; }
    h1 { font-size: 24px; }
    .step { background: #f5f5f5; padding: 16px; border-radius: 8px; margin: 16px 0; }
    code { background: #e8e8e8; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
    pre { background: #1a1a1a; color: #0f0; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 13px; }
    button { background: #000; color: #fff; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; }
    button:hover { opacity: 0.8; }
    .status { margin-top: 8px; font-size: 13px; color: #666; }
    .ok { color: #2a2; }
    .err { color: #c22; }
  </style>
</head>
<body>
  <h1>Zen Bridge Setup</h1>
  <p>The extension is installed, but the Native Messaging host is missing. Run one command in your terminal:</p>

  <div class="step">
    <pre><code id="cmd">curl -fsSL https://github.com/ringotypowriter/zen-bridge/releases/latest/download/install.sh | bash</code></pre>
    <button id="copy">Copy</button>
  </div>

  <div class="step">
    <strong>Status:</strong>
    <div id="conn" class="status">Checking connection...</div>
  </div>

  <script src="onboarding.js"></script>
</body>
</html>
